<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Apunte - PotroGuias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass-panel">
        <h1>PotrosGuias</h1>
        <a href="Apuntes.html" style="color: #9ca3af; text-decoration: none;">← Cancelar y Volver</a>
    </nav>

    <div class="container">
        
        <div class="glass-panel form-wrapper">
            <h2>Sube tu material y empieza a acumular horas para liberar tu Servicio Social.</h2>
            
            <form id="uploadForm">
                
                <div class="form-group">
                    <label>Título del Apunte / Guía</label>
                    <input type="text" class="form-input" placeholder="Ej. Guia resuelta primer parcial..." required>
                </div>

                <div class="form-group">
                    <label>Materia a la que pertenece</label>
                    <input type="text" class="form-input" placeholder="Ej. Cálculo Diferencial" required>
                </div>

                <div class="form-group">
                    <label>Nombre del Autor</label>
                    <input type="text" class="form-input" placeholder="Tu nombre completo" required>
                </div>

                <div class="form-group">
                    <label>Selecciona el archivo PDF</label>
                    <input type="file" class="form-input" accept=".pdf" required>
                </div>

                <div class="form-group">
                    <label>Selecciona una imagen de portada (opcional)</label>
                    <input type="file" class="form-input" accept="image/*">
                </div>

                <button type="submit" class="btn-submit">Subir Material a Revisión</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('materialSubido', 'true');
            window.location.href='Apuntes.html';
        });

        document.addEventListener("DOMContentLoaded", () => {
            if(localStorage.getItem('temaPreferido') === 'oro') {
                document.body.classList.add('tema-oro');
            }
        });
    </script>
</body>
</html>
