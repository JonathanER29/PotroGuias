<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotroGuias - Inicio de Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="glass-panel" style="border: none; margin-top: 20px;">
            <h1>PotroGuias</h1>
        </nav>
    </header>

    <main class="container" style="text-align: center; margin-top: 5vh;">
        <h2 style="font-size: 3rem; margin-bottom: 10px; color: #fff;">Intercambio de Conocimiento</h2>
        <p style="font-size: 1.2rem; color: #9ca3af; max-width: 600px; margin: 0 auto; margin-bottom: 30px;">
            Página web centralizada en el intercambio de conocimientos académicos para el fortalecimiento universitario. 
            ¡Inicia sesión para contribuir y explorar los materiales!
        </p>

        <div class="glass-panel form-wrapper" style="text-align: left; margin-top: 0;">
            <h3 style="text-align: center; margin-bottom: 20px; font-size: 1.5rem; color: #4ade80;">Iniciar Sesión</h3>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="correoUsuario">Correo Electrónico:</label>
                    <input type="email" id="correoUsuario" class="form-input" required placeholder="ejemplo@alumno.uaemex.mx">
                </div>
                
                <div class="form-group">
                    <label for="passwordUsuario">Contraseña:</label>
                    <input type="password" id="passwordUsuario" class="form-input" required placeholder="Ingresa tu contraseña">
                </div>
                
                <button type="submit" class="btn-submit" style="margin-top: 10px;">
                    Acceder a PotroGuias
                </button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            const correo = document.getElementById('correoUsuario').value;
            if (correo.trim() !== "") {
                const nombreUsuario = correo.split('@')[0];
                localStorage.setItem('usuarioActivo', nombreUsuario);
                window.location.href = "Apuntes.html";
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            if(localStorage.getItem('temaPreferido') === 'oro') {
                document.body.classList.add('tema-oro');
            }
        });
    </script>

</body>
</html>
